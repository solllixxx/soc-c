<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/png" href="logo.jpg">
    <title>SOC.</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100dvh;
            width: 100%;
            background: #000000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            overflow: hidden;
            position: fixed;
            color: #e5e5e5;
        }

        /* --- СТИЛІ ДЛЯ ПРЕЛОАДЕРА (ЗАВАНТАЖЕННЯ) --- */
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(0px);
            transition: opacity 0.5s ease, visibility 0.5s ease;
            flex-direction: column;
            gap: 24px;
        }

        .preloader.hide-preloader {
            opacity: 0;
            visibility: hidden;
        }

        .preloader-content {
            text-align: center;
            width: 80%;
            max-width: 280px;
        }

        .preloader-title {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #aaaaaa 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 32px;
            animation: subtlePulse 1.8s infinite ease;
        }

        @keyframes subtlePulse {
            0% { opacity: 0.7; letter-spacing: -0.5px; }
            50% { opacity: 1; letter-spacing: -0.2px; }
            100% { opacity: 0.7; letter-spacing: -0.5px; }
        }

        /* Контейнер лінії */
        .loader-line-wrapper {
            width: 100%;
            height: 4px;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }

        .loader-line {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #e9e9e9, #bbbbbb, #b4b4b4);
            border-radius: 4px;
            animation: loadingProgress 2s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
            position: relative;
            box-shadow: 0 0 6px #707070;
        }

        @keyframes loadingProgress {
            0% { width: 0%; }
            20% { width: 25%; }
            50% { width: 65%; }
            80% { width: 88%; }
            100% { width: 100%; }
        }

        .preloader-sub {
            font-size: 0.7rem;
            color: #6a6a6a;
            letter-spacing: 1px;
            margin-top: 16px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Основний інтерфейс (спочатку невидимий) */
        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: #000000;
            padding-top: env(safe-area-inset-top);
            padding-bottom: 0 !important;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        .app.app-visible {
            opacity: 1;
        }

        .header {
            padding: 10px 16px;
            background: #0a0a0a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
            min-height: 56px;
        }
        .header h1 {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff 0%, #aaaaaa 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        #status {
            font-size: 0.65rem;
            font-weight: 600;
            background: #1a1a1a;
            padding: 4px 10px;
            border-radius: 40px;
            color: #bbb;
            border: 0.5px solid #2c2c2c;
        }
        .exit-btn {
            background: #1c1c1c;
            color: #e0e0e0;
            border: none;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .exit-btn:hover { background: #2e2e2e; transform: scale(0.96); }
        .exit-btn:active { transform: scale(0.94); background: #3a3a3a; }

        .setup {
            padding: 12px 14px;
            background: #050505;
            border-bottom: 1px solid #1c1c1c;
            flex-shrink: 0;
        }
        .nick-box {
            background: #111111;
            padding: 8px 12px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 10px;
            border: 1px solid #2a2a2a;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nick-box:hover { background: #1a1a1a; border-color: #4a4a4a; }
        #my-nick-display {
            font-family: monospace;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            color: #f0f0f0;
        }
        .nick-box small { color: #6a6a6a; font-size: 0.6rem; }
        .connect-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #peer-nick-input {
            flex: 1;
            background: #111;
            border: 1px solid #2c2c2c;
            padding: 10px 14px;
            border-radius: 40px;
            color: white;
            font-size: 0.85rem;
            outline: none;
        }
        #peer-nick-input:focus { border-color: #6a6a6a; background: #181818; }
        .connect-btn {
            background: #222;
            border: none;
            border-radius: 40px;
            padding: 0 18px;
            height: 42px;
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 0.3px;
            color: #ddd;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .connect-btn:hover { background: #333; color: white; transform: scale(0.97); }
        .connect-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #chat {
            flex: 1;
            padding: 16px 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #000000;
            scroll-behavior: smooth;
        }
        
        .not-connect {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 15px;
            color: #444;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .not-connect span:first-child {
            font-size: 2rem;
            opacity: 0.3;
        }
        
        .msg {
            max-width: 80%;
            padding: 9px 14px;
            border-radius: 22px;
            font-size: 0.9rem;
            line-height: 1.35;
            word-wrap: break-word;
            animation: fadeSlide 0.18s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .my {
            align-self: flex-end;
            background: #2c2c2c;
            color: white;
            border-bottom-right-radius: 5px;
        }
        .other {
            align-self: flex-start;
            background: #141414;
            border: 0.5px solid #2b2b2b;
            border-bottom-left-radius: 5px;
            color: #efefef;
        }
        .msg img {
            max-width: 100%;
            border-radius: 16px;
            display: block;
            margin-top: 5px;
            border: 1px solid #2e2e2e;
        }
        audio {
            height: 38px;
            width: 200px;
            max-width: 100%;
            margin-top: 5px;
            border-radius: 30px;
            filter: grayscale(0.2);
        }

        .input-area {
            padding: 8px 12px;
            background: #0a0a0a;
            border-top: 1px solid #1f1f1f;
            flex-shrink: 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom)); 
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: #1a1a1a;
            color: #ddd;
            font-size: 1.25rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-icon:hover {
            background: #2e2e2e;
            transform: scale(0.94);
            color: white;
        }
        .btn-icon:active {
            transform: scale(0.9);
        }
        .btn-red {
            background: #3a2a2a !important;
            color: #ffaaaa !important;
        }
        .btn-red:hover {
            background: #522e2e !important;
        }
        #msgInput {
            flex: 1;
            min-width: 0;
            background: #111;
            border: 1px solid #2a2a2a;
            padding: 10px 14px;
            border-radius: 32px;
            color: #f0f0f0;
            outline: none;
            font-size: 0.9rem;
        }
        #msgInput:focus {
            border-color: #6a6a6a;
            background: #1a1a1a;
        }
        .send-btn {
            background: #202020;
            font-size: 1.1rem;
        }
        .send-btn:hover {
            background: #3a3a3a;
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 24px;
        }
        .modal {
            background: #111111;
            padding: 22px 18px;
            border-radius: 32px;
            width: 100%;
            max-width: 280px;
            text-align: center;
            border: 1px solid #333;
        }
        .modal #modal-text {
            font-size: 0.9rem;
            margin-bottom: 18px;
            font-weight: 400;
            color: #ccc;
            line-height: 1.4;
        }
        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }
        .modal-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.85rem;
        }
        .modal-btn:first-child {
            background: #1f1f1f;
            color: #ccc;
        }
        .modal-btn:first-child:hover {
            background: #2d2d2d;
            color: white;
        }
        .modal-btn:last-child {
            background: #222;
            color: #ffa2a2;
        }
        .modal-btn:last-child:hover {
            background: #3a1e1e;
            color: #ffc5c5;
        }
        
        .nick-input-modal {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 10px;
            border-radius: 12px;
            color: white;
            width: 100%;
            margin: 15px 0;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }
        .nick-input-modal:focus {
            border-color: #6a6a6a;
        }
        
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-track { background: #0a0a0a; }
        #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        @media (max-width: 420px) {
            .btn-icon {
                width: 38px;
                height: 38px;
                font-size: 1.1rem;
            }
            .input-area {
                gap: 6px;
                padding: 6px 10px;
            }
            #msgInput {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
            .connect-btn {
                padding: 0 12px;
                height: 38px;
                font-size: 0.7rem;
            }
            #peer-nick-input {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
        }
        @media (max-width: 360px) {
            .btn-icon {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
            .send-btn {
                font-size: 1rem;
            }
        }
        @media (min-width: 1200px) {
            .app { max-width: 1000px; border-radius: 0px; box-shadow: 0 0 0 1px #2a2a2a; }
            body { background: #050505; }
        }

        .date-divider {
            align-self: center;
            margin: 20px 0 10px;
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #0a0a0a;
            padding: 4px 12px;
            border-radius: 10px;
        }

        .msg {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .msg-time {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-top: 4px;
            align-self: flex-end;
        }

        .btn-img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            display: block;
            filter: brightness(0) invert(1); 
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .btn-icon:hover .btn-img {
            opacity: 1;
        }

        .btn-red .btn-img {
            filter: none;
        }
    </style>
</head>
<body>
<audio id="msgSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

<!-- ПРЕЛОАДЕР: напис SOC. + лінія завантаження на 2 секунди -->
<div id="preloader" class="preloader">
    <div class="preloader-content">
        <div class="preloader-title">SOC.</div>
        <div class="loader-line-wrapper">
            <div class="loader-line"></div>
        </div>
        <div class="preloader-sub">initializing secure channel</div>
    </div>
</div>

<div class="app" id="mainApp">
    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <h1>SOC.</h1>
            <span id="status">OFFLINE</span>
        </div>
        <div class="header-actions">
            <button class="exit-btn" onclick="showRules()">ⅰ</button>
            <button class="exit-btn" onclick="showConfirm()">✕</button>
        </div>
    </div>
    <div class="setup" id="setup-ui">
        <div class="nick-box" onclick="changeNickname()">
            <div id="my-nick-display">---</div>
            <small>TAP TO CHANGE NICKNAME</small>
        </div>
        <div class="connect-row">
            <input type="text" id="peer-nick-input" placeholder="friend's nickname..." autocomplete="off" disabled>
            <button class="connect-btn" onclick="connectToPeer()" disabled>CONNECT</button>
        </div>
    </div>
    <div id="chat">
        <div class="not-connect">
            <span>NOT CONNECTED</span>
        </div>
    </div>
    <div class="input-area">
        <button class="btn-icon" id="attachBtn" onclick="document.getElementById('fileInput').click()" disabled>
            <img src="plus.png" alt="+" class="btn-img">
        </button>
        
        <button class="btn-icon" id="recordBtn" onclick="toggleRecord()" disabled>
            <img src="mic.png" alt="V" class="btn-img" id="mic-icon">
        </button>
        
        <input type="text" id="msgInput" placeholder="Message..." onkeypress="if(event.key==='Enter') sendText()" autocomplete="off" disabled>
        
        <button class="btn-icon send-btn" onclick="sendText()" disabled>
            <img src="send.png" alt=">" class="btn-img">
        </button>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal">
        <div id="modal-text"></div>
        <div class="modal-btns" id="modal-actions"></div>
    </div>
</div>

<input type="file" id="fileInput" hidden accept="image/*" onchange="sendFile(this.files[0])">

<script>
    // ---------- ЛОГІКА ПРЕЛОАДЕРА: приховати через 2 секунди та показати основний інтерфейс ----------
    window.addEventListener('load', () => {
        const preloader = document.getElementById('preloader');
        const mainApp = document.getElementById('mainApp');
        
        // Через 2 секунди (як триває анімація лінії) ховаємо прелоадер і плавно показуємо додаток
        setTimeout(() => {
            if (preloader) {
                preloader.classList.add('hide-preloader');
                // Після зникнення прелоадера видаляємо його з DOM, щоб не заважав клікам
                setTimeout(() => {
                    if (preloader && preloader.parentNode) {
                        preloader.style.display = 'none';
                    }
                }, 500);
            }
            // Робимо основний додаток видимим
            mainApp.classList.add('app-visible');
        }, 2000); // Точно 2 секунди, як лінія завантаження
    });

    let myNick = localStorage.getItem('soc-nickname');
    let peer = null;
    let conn = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let activeStream = null;
    let lastDateLabel = "";
    let connectedNick = null;
    let isNickValid = false;
    
    function isValidNick(nick) {
        if (!nick || nick.length < 3) return false;
        const validRegex = /^[a-zA-Z0-9_]{3,20}$/;
        return validRegex.test(nick);
    }
    
    function enableChatControls(enable) {
        const peerInput = document.getElementById('peer-nick-input');
        const connectBtn = document.querySelector('.connect-btn');
        const attachBtn = document.getElementById('attachBtn');
        const recordBtn = document.getElementById('recordBtn');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.querySelector('.send-btn');
        
        if (enable) {
            peerInput.disabled = false;
            connectBtn.disabled = false;
            attachBtn.disabled = false;
            recordBtn.disabled = false;
            msgInput.disabled = false;
            sendBtn.disabled = false;
        } else {
            peerInput.disabled = true;
            connectBtn.disabled = true;
            attachBtn.disabled = true;
            recordBtn.disabled = true;
            msgInput.disabled = true;
            sendBtn.disabled = true;
        }
    }
    
    function initOrChangeNick() {
        if (myNick && isValidNick(myNick)) {
            isNickValid = true;
            startWithNick(myNick);
            enableChatControls(true);
        } else {
            isNickValid = false;
            enableChatControls(false);
            showNicknameModal();
        }
    }
    
    function showNicknameModal() {
        const overlay = document.getElementById('modal-overlay');
        const txtDiv = document.getElementById('modal-text');
        txtDiv.style.textAlign = 'center';
        txtDiv.innerHTML = `
            <b style="color:white; display:block; margin-bottom:10px;">ENTER YOUR NICKNAME</b>
            <input type="text" id="nickInputModal" class="nick-input-modal" placeholder="3-20 characters (a-z, 0-9, _)" maxlength="20" autocomplete="off">
            <div style="font-size:0.7rem; color:#666; margin-top:5px;">This will be your ID</div>
        `;
        
        const actionsDiv = document.getElementById('modal-actions');
        actionsDiv.innerHTML = `<button class="modal-btn" id="nickSubmitBtn" style="width:100%">REGISTRATION</button>`;
        overlay.style.display = 'flex';
        
        const input = document.getElementById('nickInputModal');
        input.focus();
        
        const submitBtn = document.getElementById('nickSubmitBtn');
        
        function submitNick() {
            const newNick = input.value.trim();
            if (!isValidNick(newNick)) {
                showAlert('Nickname must be 3-20 characters (letters, numbers, _)', () => {
                    input.value = '';
                    input.focus();
                });
                return;
            }
            myNick = newNick;
            localStorage.setItem('soc-nickname', myNick);
            overlay.style.display = 'none';
            isNickValid = true;
            startWithNick(myNick);
            enableChatControls(true);
        }
        
        submitBtn.onclick = submitNick;
        input.onkeypress = (e) => {
            if (e.key === 'Enter') submitNick();
        };
    }
    
    function changeNickname() {
        const overlay = document.getElementById('modal-overlay');
        const txtDiv = document.getElementById('modal-text');
        txtDiv.style.textAlign = 'center';
        txtDiv.innerHTML = `
            <b style="color:white; display:block; margin-bottom:10px;">CHANGE NICKNAME</b>
            <input type="text" id="nickInputModal" class="nick-input-modal" placeholder="3-20 characters (a-z, 0-9, _)" maxlength="20" autocomplete="off" value="${myNick || ''}">
            <div style="font-size:0.7rem; color:#666; margin-top:5px;">This will be your ID</div>
            <div style="font-size:0.7rem; color:#ff8888; margin-top:10px;">Changing nickname will restart connection</div>
        `;
        
        const actionsDiv = document.getElementById('modal-actions');
        actionsDiv.innerHTML = `
            <button class="modal-btn" id="nickCancelBtn">CANCEL</button>
            <button class="modal-btn" id="nickChangeBtn">CHANGE</button>
        `;
        overlay.style.display = 'flex';
        
        const input = document.getElementById('nickInputModal');
        input.focus();
        
        document.getElementById('nickCancelBtn').onclick = () => {
            overlay.style.display = 'none';
        };
        
        document.getElementById('nickChangeBtn').onclick = () => {
            const newNick = input.value.trim();
            if (!isValidNick(newNick)) {
                showAlert('Nickname must be 3-20 characters (letters, numbers, _)');
                return;
            }
            myNick = newNick;
            localStorage.setItem('soc-nickname', myNick);
            overlay.style.display = 'none';
            if (conn && conn.open) {
                conn.close();
            }
            if (peer) {
                peer.destroy();
            }
            startWithNick(myNick);
            document.getElementById('chat').innerHTML = '<div class="not-connect"><span>NOT CONNECTED</span></div>';
            connectedNick = null;
            updateStatus('offline', '#bbb');
            document.getElementById('setup-ui').style.display = 'block';
            enableChatControls(true);
        };
    }
    
    function startWithNick(nick) {
        const id = nick;
        document.getElementById('my-nick-display').innerHTML = `${nick}`;
        
        if (peer) {
            peer.destroy();
        }
        
        peer = new Peer(id, { debug: 2 });
        
        peer.on('open', (peerId) => {
            updateStatus('online', '#da8f27');
            console.log('PeerJS opened with ID:', peerId);
        });
        
        peer.on('error', (err) => {
            console.warn(err);
            updateStatus('error', '#aa5555');
            if (err.type === 'unavailable-id') {
                showAlert('This nickname is already taken! Choose another one.', () => {
                    localStorage.removeItem('soc-nickname');
                    location.reload();
                });
            }
        });
        
        peer.on('connection', (incomingConn) => {
            if (conn && (conn.open || conn.peerConnection)) {
                incomingConn.close();
                return;
            }
            conn = incomingConn;
            setupConnection();
        });
        
        updateStatus('online', '#da8f27');
    }
    
    function setupConnection() {
        if (!conn) return;
        
        conn.on('open', () => {
            document.getElementById('setup-ui').style.display = 'none';
            updateStatus(`chat with: ${connectedNick || 'friend'}`, '#559b61');
            conn.send({ type: 'nick', data: myNick });
            const chatDiv = document.getElementById('chat');
            if (chatDiv.children.length === 1 && chatDiv.children[0].classList?.contains('not-connect')) {
                chatDiv.innerHTML = '';
                lastDateLabel = '';
            }
        });
        
        conn.on('data', (payload) => {
            if (payload && payload.type) {
                if (payload.type === 'clear') {
                    localStorage.removeItem('soc-c-media-history');
                    document.getElementById('chat').innerHTML = '';
                    showAlert("Peer cleared the chat history");
                } else if (payload.type === 'nick') {
                    connectedNick = payload.data;
                    updateStatus(`chat with: ${connectedNick}`, '#559b61');
                } else if (payload.data) {
                    addMsg(payload.data, 'other', payload.type, true);
                }
            }
        });
        
        conn.on('close', () => {
            showAlert("Connection closed");
            document.getElementById('setup-ui').style.display = 'block';
            updateStatus('online', '#da8f27');
            connectedNick = null;
            const chatDiv = document.getElementById('chat');
            chatDiv.innerHTML = '<div class="not-connect"><span>NOT CONNECTED</span></div>';
            lastDateLabel = '';
        });
    }
    
    function connectToPeer() {
        if (!peer) {
            showAlert("Initializing...");
            return;
        }
        const friendNick = document.getElementById('peer-nick-input').value.trim();
        if (!friendNick) { showAlert("Enter friend's nickname"); return; }
        if (friendNick === myNick) { showAlert("You cannot connect to yourself"); return; }
        
        const newConn = peer.connect(friendNick);
        conn = newConn;
        setupConnection();
        updateStatus('connecting...', '#b0b0b0');
    }
    
    function addMsg(data, side, type, saveToStorage = true, savedTime = null) {
        const chatDiv = document.getElementById('chat');
        
        if (chatDiv.children.length === 1 && chatDiv.children[0].classList?.contains('not-connect')) {
            chatDiv.innerHTML = '';
            lastDateLabel = '';
        }
        
        const now = savedTime ? new Date(savedTime) : new Date();
        
        const dateOptions = { day: 'numeric', month: 'long' };
        const currentDateLabel = now.toLocaleDateString('uk-UA', dateOptions);

        if (currentDateLabel !== lastDateLabel) {
            const dateDiv = document.createElement('div');
            dateDiv.className = 'date-divider';
            dateDiv.innerText = currentDateLabel;
            chatDiv.appendChild(dateDiv);
            lastDateLabel = currentDateLabel;
        }

        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${side === 'my' ? 'my' : 'other'}`;
        
        const content = document.createElement('div');
        if (type === 'text') {
            content.innerText = data;
        } else if (type === 'image') {
            const img = document.createElement('img');
            img.src = data;
            content.appendChild(img);
        } else if (type === 'audio') {
            const audioEl = document.createElement('audio');
            audioEl.controls = true;
            audioEl.src = data;
            content.appendChild(audioEl);
        }
        msgDiv.appendChild(content);

        const timeDiv = document.createElement('div');
        timeDiv.className = 'msg-time';
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        timeDiv.innerText = `${hours}:${minutes}`;
        msgDiv.appendChild(timeDiv);
        
        chatDiv.appendChild(msgDiv);
        chatDiv.scrollTop = chatDiv.scrollHeight;
        
        if (side === 'other' && !savedTime) {
            const sound = document.getElementById('msgSound');
            if (sound) {
                sound.currentTime = 0;
                sound.play().catch(e => console.log("Sound blocked"));
            }
        }

        if (saveToStorage) {
            const history = JSON.parse(localStorage.getItem('soc-c-media-history') || '[]');
            history.push({ data, side, type, time: now.getTime() });
            if (history.length > 50) history.shift();
            localStorage.setItem('soc-c-media-history', JSON.stringify(history));
        }
    }
    
    function loadHistory() {
        const raw = localStorage.getItem('soc-c-media-history');
        if (!raw) return;
        try {
            const history = JSON.parse(raw);
            const chatDiv = document.getElementById('chat');
            if (history.length > 0) {
                chatDiv.innerHTML = "";
                lastDateLabel = "";
                history.forEach(item => {
                    addMsg(item.data, item.side, item.type, false, item.time);
                });
            }
        } catch(e) { console.error("History load error", e); }
    }

    function updateStatus(text, colorHint) {
        const st = document.getElementById('status');
        st.innerText = text.toUpperCase();
        st.style.color = colorHint || '#bbb';
    }

    // Запуск після прелоадера, але основні функції будуть доступні після того як юзер введе нік.
    // Щоб уникнути конфліктів: ініціалізація відкладена до моменту появи інтерфейсу, але loadHistory та інше запустимо, коли додаток видимий.
    // Проте, щоб все було стабільно, викликаємо ініціалізацію після прелоадера. 
    // Але через setTimeout на завантаженні, прелоадер зникає через 2 секунди. Запустимо ініціалізацію після зникнення або одразу, але збережемо порядок.
    // Просто викликаємо initOrChangeNick одразу після того, як DOM готовий, але контроли будуть заблоковані поки нік не валідний.
    // Але елементи можуть бути заблоковані, поки не введений нік, що ідеально. Тому викликаємо:
    window.onload = () => {
        // Ініціалізація логіки ніка та пірів (вона спрацює або одразу, або через модалку)
        initOrChangeNick();
        loadHistory();
        // Оскільки прелоадер показується 2 секунди, то за цей час нік може бути ще не заданий,
        // але це нормально. Після введення ніка пір стартує.
    };
    
    function sendText() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (conn && conn.open && text !== "") {
            conn.send({ type: 'text', data: text });
            addMsg(text, 'my', 'text', true);
            input.value = '';
        } else {
            showAlert("No active connection");
        }
    }

    function sendFile(file) {
        if (!file || !conn || !conn.open) {
            showAlert("Connect first");
            return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
            const b64 = ev.target.result;
            conn.send({ type: 'image', data: b64 });
            addMsg(b64, 'my', 'image', true);
        };
        reader.readAsDataURL(file);
    }

    async function toggleRecord() {
        const btn = document.getElementById('recordBtn');
        const micImg = document.getElementById('mic-icon');
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            if (activeStream) {
                activeStream.getTracks().forEach(track => track.stop());
                activeStream = null;
            }
            btn.classList.remove('btn-red');
            if (micImg) micImg.src = "mic.png"; 
            return;
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            activeStream = stream;
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const audioUrl = ev.target.result;
                    if (conn && conn.open) conn.send({ type: 'audio', data: audioUrl });
                    addMsg(audioUrl, 'my', 'audio', true);
                };
                reader.readAsDataURL(blob);
            };
            mediaRecorder.start();
            btn.classList.add('btn-red');
            if (micImg) micImg.src = "stop.png"; 
        } catch (err) { showAlert("Mic access denied"); }
    }

    function showAlert(msg, callback) {
        const overlay = document.getElementById('modal-overlay');
        document.getElementById('modal-text').innerText = msg;
        const actionsDiv = document.getElementById('modal-actions');
        actionsDiv.innerHTML = `<button class="modal-btn" id="alertOkBtn">OK</button>`;
        overlay.style.display = 'flex';
        document.getElementById('alertOkBtn').onclick = () => {
            overlay.style.display = 'none';
            if (callback) callback();
        };
    }

    function showConfirm() {
        const overlay = document.getElementById('modal-overlay');
        document.getElementById('modal-text').innerText = "Clear history and exit?";
        const actionsDiv = document.getElementById('modal-actions');
        actionsDiv.innerHTML = `
            <button class="modal-btn" id="confirmNo">CANCEL</button>
            <button class="modal-btn" id="confirmYes">CLEAR & EXIT</button>
        `;
        overlay.style.display = 'flex';
        document.getElementById('confirmNo').onclick = () => overlay.style.display = 'none';
        document.getElementById('confirmYes').onclick = () => {
            if (conn && conn.open) conn.send({ type: 'clear' });
            localStorage.removeItem('soc-c-media-history');
            location.reload();
        };
    }

    function showRules() {
        const overlay = document.getElementById('modal-overlay');
        const txtDiv = document.getElementById('modal-text');
        txtDiv.style.textAlign = 'left';
        txtDiv.innerHTML = `
            <b style="color:white; display:block; margin-bottom:10px; font-size:1rem;">Legal Disclaimer</b>
            This application uses P2P (Peer-to-Peer) technology. All data is transferred directly between devices.<br><br>
            The developer does NOT store, monitor, or have access to your conversations. Therefore, the developer is NOT responsible for user behavior or content shared.<br><br>
            This tool was created for good purposes and privacy. Please use it responsibly.
        `;
        document.getElementById('modal-actions').innerHTML = `<button class="modal-btn" id="rulesOkBtn" style="width:100%">I UNDERSTAND</button>`;
        overlay.style.display = 'flex';
        document.getElementById('rulesOkBtn').onclick = () => {
            overlay.style.display = 'none';
            txtDiv.style.textAlign = 'center';
        };
    }
</script>
