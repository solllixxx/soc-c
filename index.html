<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>soc-c</title>
    <style>
        :root {
            --bg: #0b0e11;
            --panel: #15191c;
            --accent: #00a3ff;
            --text: #e1e1e1;
            --my-msg: #005fb8;
            --other-msg: #2a2e33;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: var(--panel);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #23292e;
        }

        /* Header */
        .header {
            padding: 20px;
            background: #1c2126;
            text-align: center;
            border-bottom: 1px solid #23292e;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            color: var(--accent);
        }

        /* Connection Area */
        .setup-box {
            padding: 15px;
            background: #1c2126;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        textarea {
            width: 100%;
            height: 60px;
            background: var(--bg);
            border: 1px solid #333;
            color: #888;
            border-radius: 10px;
            padding: 10px;
            resize: none;
            font-size: 11px;
            box-sizing: border-box;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-main { background: var(--accent); color: white; }
        .btn-sub { background: #2a2e33; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Chat Area */
        #chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .my-msg {
            align-self: flex-end;
            background: var(--my-msg);
            border-bottom-right-radius: 2px;
        }

        .other-msg {
            align-self: flex-start;
            background: var(--other-msg);
            border-bottom-left-radius: 2px;
        }

        /* Input Area */
        .input-bar {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: #1c2126;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg);
            border: 1px solid #333;
            padding: 12px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        .status {
            font-size: 10px;
            text-transform: uppercase;
            color: #555;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>SOC-C</h1>
        <div id="status" class="status">Очікування з'єднання</div>
    </div>

    <div class="setup-box">
        <button class="btn btn-main" onclick="createOffer()">Створити ключ доступу</button>
        <textarea id="localOffer" readonly placeholder="Ваш ключ з'явиться тут"></textarea>
        
        <textarea id="remoteOffer" placeholder="Вставте ключ партнера"></textarea>
        <button class="btn btn-sub" onclick="connect()">Підключитися</button>
    </div>

    <div id="chat"></div>

    <div class="input-bar">
        <input type="text" id="messageInput" placeholder="Повідомлення..." onkeypress="handleEnter(event)">
        <button class="btn btn-main" onclick="sendMessage()">Відправити</button>
    </div>
</div>

<script>
    let pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
    let dc;

    // Створення кімнати (Host)
    async function createOffer() {
        dc = pc.createDataChannel("chat");
        setupDataChannel(dc);

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        pc.onicecandidate = (e) => {
            if (!e.candidate) {
                document.getElementById('localOffer').value = btoa(JSON.stringify(pc.localDescription));
                document.getElementById('status').innerText = "Ключ створено. Відправте його другу";
            }
        };
    }

    // Підключення
    async function connect() {
        const input = document.getElementById('remoteOffer').value.trim();
        if (!input) return;

        try {
            const remoteDesc = new RTCSessionDescription(JSON.parse(atob(input)));

            if (remoteDesc.type === "offer") {
                await pc.setRemoteDescription(remoteDesc);
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                
                pc.onicecandidate = (e) => {
                    if (!e.candidate) {
                        document.getElementById('localOffer').value = btoa(JSON.stringify(pc.localDescription));
                        document.getElementById('status').innerText = "Відправте свій ключ у відповідь";
                    }
                };
            } else {
                await pc.setRemoteDescription(remoteDesc);
            }
        } catch (err) {
            alert("Помилка ключа. Перевірте правильність.");
        }
    }

    pc.ondatachannel = (e) => {
        dc = e.channel;
        setupDataChannel(dc);
    };

    function setupDataChannel(channel) {
        channel.onopen = () => {
            document.getElementById('status').innerText = "Онлайн";
            document.getElementById('status').style.color = "#00ff88";
        };
        channel.onmessage = (e) => addMessage(e.data, 'other');
        channel.onclose = () => {
            document.getElementById('status').innerText = "Офлайн";
            document.getElementById('status').style.color = "#ff4444";
        };
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        if (dc && dc.readyState === "open" && input.value.trim() !== "") {
            dc.send(input.value);
            addMessage(input.value, 'me');
            input.value = "";
        }
    }

    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function addMessage(text, side) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg ${side === 'me' ? 'my-msg' : 'other-msg'}`;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
