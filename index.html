<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/png" href="logo.jpg">
    <title>SOC.</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100dvh;
            width: 100%;
            background: #000000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            overflow: hidden;
            position: fixed;
            color: #e5e5e5;
        }

        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            flex-direction: column;
            gap: 24px;
        }
        .preloader.hide-preloader { opacity: 0; visibility: hidden; }
        .preloader-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-align: center;
        }
        .preloader-title {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #aaaaaa 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: subtlePulse 1.8s infinite ease;
            margin-bottom: 8px;
        }
        @keyframes subtlePulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .loader-line-wrapper {
            width: 80%;
            max-width: 280px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            margin: 0 auto;
        }
        .loader-line {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #e9e9e9, #bbbbbb);
            animation: loadingProgress 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes loadingProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .preloader-sub {
            font-size: 0.7rem;
            color: #6a6a6a;
            letter-spacing: 1px;
            margin-top: 16px;
            text-transform: uppercase;
            text-align: center;
        }

        .app-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: #000000;
        }
        
        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: #000000;
            padding-top: env(safe-area-inset-top);
            opacity: 0;
            transition: opacity 0.4s ease;
            position: relative;
            overflow-x: hidden;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
        }
        .app.app-visible { opacity: 1; }

        .home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000000;
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform: translateX(0);
            z-index: 10;
        }
        
        .chat-screen {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000000;
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform: translateX(100%);
            z-index: 20;
        }
        
        .home-screen.chat-open {
            transform: translateX(-30%);
        }
        
        .chat-screen.chat-visible {
            transform: translateX(0);
        }

        .home-header {
            padding: 12px 16px;
            background: #0a0a0a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        .home-header h1 {
            font-size: 1.35rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff 0%, #aaaaaa 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        #status {
            font-size: 0.65rem;
            font-weight: 600;
            background: #1a1a1a;
            padding: 4px 10px;
            border-radius: 40px;
            color: #bbb;
            border: 0.5px solid #2c2c2c;
        }

        .home-scrollable {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .main-profile-card {
            margin: 30px 20px;
            background: #0f0f0f;
            border-radius: 32px;
            border: 1px solid #2a2a2a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .main-profile-card:active { transform: scale(0.98); background: #151515; }
        
        .avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #1e1e1e;
            overflow: hidden;
            border: 2px solid #3a3a3a;
            margin-bottom: 12px;
        }
        .avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        .main-nick { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
        .main-status { font-size: 0.8rem; color: #9a9a9a; background: #1a1a1a; padding: 4px 14px; border-radius: 30px; }

        .active-chat-row {
            margin: 10px 20px;
            background: #111111;
            border-radius: 60px;
            border: 1px solid #2a2a2a;
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px 8px 8px;
            cursor: pointer;
        }
        .active-chat-row:active { background: #1a1a1a; }
        .active-chat-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }
        .active-chat-avatar { width: 48px; height: 48px; border-radius: 50%; background: #2a2a2a; overflow: hidden; flex-shrink: 0; }
        .active-chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .active-chat-info {
            flex: 1;
            min-width: 0;
        }
        .active-chat-nick { font-weight: 600; font-size: 1rem; color: #eee; margin-bottom: 4px; }
        .active-chat-lastmsg {
            font-size: 0.7rem;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .close-chat-icon {
            background: #2a2a2a;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 30px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-chat-icon img {
            width: 18px;
            height: 18px;
            filter: brightness(0) invert(1);
            opacity: 0.8;
        }
        .close-chat-icon:hover {
            transform: scale(0.92);
            background: #3a2a2a;
        }
        .close-chat-icon:hover img {
            opacity: 1;
        }

        .connect-section { margin: 10px 20px; }
        .connect-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #peer-nick-input {
            flex: 1;
            background: #111;
            border: 1px solid #2c2c2c;
            padding: 12px 16px;
            border-radius: 40px;
            color: white;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s ease;
        }
        #peer-nick-input:focus { border-color: #6a6a6a; background: #181818; }
        .connect-btn {
            background: #222;
            border: none;
            border-radius: 40px;
            padding: 0 18px;
            height: 46px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #ddd;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .connect-btn:hover {
            transform: scale(0.96);
            background: #2a2a2a;
            color: #ffffff;
        }

        .not-connect-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            flex-direction: column;
            gap: 15px;
            min-height: 150px;
        }
        .not-connect-placeholder span:first-child { font-size: 2rem; opacity: 0.3; }

        .rules-bottom-btn {
            margin: 20px;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 60px;
            padding: 12px;
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .rules-bottom-btn:hover {
            transform: scale(0.97);
            background: #151515;
            color: #aaa;
        }

        .chat-header {
            padding: 10px 12px;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .back-home-btn {
            background: #1a1a1a;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-home-btn img {
            width: 20px;
            height: 20px;
            filter: brightness(0) invert(1);
            opacity: 0.8;
        }
        .back-home-btn:hover {
            transform: scale(0.9);
            background: #2a2a2a;
        }
        .back-home-btn:hover img {
            opacity: 1;
        }
        .chat-peer-info-center {
            flex: 1;
            display: flex;
            justify-content: center;
        }
        .peer-info-button {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .peer-info-button:hover {
            transform: scale(0.96);
            background: #2a2a2a;
        }
        .peer-info-avatar { width: 36px; height: 36px; border-radius: 50%; background: #2a2a2a; overflow: hidden; }
        .peer-info-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .peer-info-nick { font-weight: 600; font-size: 0.95rem; color: #eee; }
        .placeholder-right { width: 36px; visibility: hidden; }

        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #000000;
        }
        .msg {
            max-width: 80%;
            padding: 9px 14px;
            border-radius: 22px;
            font-size: 0.9rem;
            line-height: 1.35;
            word-wrap: break-word;
            animation: fadeSlide 0.18s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .my { align-self: flex-end; background: #2c2c2c; color: white; border-bottom-right-radius: 5px; }
        .other { align-self: flex-start; background: #141414; border: 0.5px solid #2b2b2b; border-bottom-left-radius: 5px; color: #efefef; }
        .msg img { max-width: 100%; border-radius: 16px; display: block; margin-top: 5px; }
        audio { height: 38px; width: 180px; max-width: 180px; margin-top: 5px; border-radius: 30px; flex-shrink: 0; }

        .input-area {
            padding: 8px 12px;
            background: #0a0a0a;
            border-top: 1px solid #1f1f1f;
            flex-shrink: 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom)); 
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: #1a1a1a;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .btn-icon:hover {
            transform: scale(0.9);
            background: #2a2a2a;
        }
        .btn-red { background: #3a2a2a !important; }
        .btn-red:hover { background: #4a3a3a !important; }
        #msgInput {
            flex: 1;
            background: #111;
            border: 1px solid #2a2a2a;
            padding: 10px 14px;
            border-radius: 32px;
            color: white;
            outline: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        #msgInput:focus { border-color: #6a6a6a; background: #181818; }
        .send-btn { background: #202020; flex-shrink: 0; }
        .send-btn:hover { background: #303030; }
        .btn-img { width: 22px; height: 22px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.8; }
        .date-divider {
            align-self: center;
            margin: 20px 0 10px;
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            background: #0a0a0a;
            padding: 4px 12px;
            border-radius: 10px;
        }
        .msg-time {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-top: 4px;
            align-self: flex-end;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 24px;
        }
        .modal {
            background: #111111;
            padding: 22px 18px;
            border-radius: 32px;
            width: 100%;
            max-width: 300px;
            text-align: center;
            border: 1px solid #333;
        }
        .modal #modal-text { font-size: 0.9rem; margin-bottom: 18px; color: #ccc; line-height: 1.4; }
        .modal-btns { display: flex; gap: 10px; margin-top: 6px; }
        .modal-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .modal-btn:hover {
            transform: scale(0.96);
            filter: brightness(0.9);
        }
        .modal-btn:first-child { background: #1f1f1f; color: #ccc; }
        .modal-btn:last-child { background: #222; color: #ffa2a2; }
        .nick-input-modal {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 10px;
            border-radius: 12px;
            color: white;
            width: 100%;
            margin: 15px 0;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }
        .status-select {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            margin: 15px 0;
            cursor: pointer;
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            justify-items: center;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .avatar-option {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #2a2a2a;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .avatar-option:hover { transform: scale(0.95); opacity: 0.8; }
        .avatar-option.selected { border-color: #ffffff; }
        .avatar-option img { width: 100%; height: 100%; object-fit: cover; }
        .flex-btns { display: flex; gap: 10px; margin-top: 12px; }
        .modal-avatar-container {
            position: relative;
            display: inline-block;
            margin: 0 auto 15px;
            cursor: pointer;
        }
        .modal-edit-icon {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: #2c2c2c;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #555;
            font-size: 14px;
            pointer-events: none;
        }
        .main-profile-card:hover {
            transform: scale(0.98);
            background: #151515;
        }
        .active-chat-row:hover {
            background: #181818;
            border-color: #3a3a3a;
        }
        #recordBtn {
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @media (min-width: 801px) {
            body, html {
                background: #000000;
            }
            .app {
                box-shadow: -2px 0 5px rgba(255,255,255,0.02), 2px 0 5px rgba(255,255,255,0.02);
                border-left: 1px solid #1a1a1a;
                border-right: 1px solid #1a1a1a;
            }
            .app-wrapper::before,
            .app-wrapper::after {
                content: '';
                position: fixed;
                top: 0;
                bottom: 0;
                width: calc((100% - 800px) / 2);
                background: #000000;
                z-index: 5;
                pointer-events: none;
            }
            .app-wrapper::before {
                left: 0;
            }
            .app-wrapper::after {
                right: 0;
            }
        }
        
        @media (max-width: 800px) {
            .app-wrapper::before,
            .app-wrapper::after {
                display: none;
            }
            .app {
                border-left: none;
                border-right: none;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
<audio id="msgSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

<div id="preloader" class="preloader">
    <div class="preloader-content">
        <div class="preloader-title">SOC.</div>
        <div class="loader-line-wrapper"><div class="loader-line"></div></div>
        <div class="preloader-sub">ANONYMOUS MESSENGER FROM END TO END</div>
    </div>
</div>

<div class="app-wrapper">
    <div class="app" id="mainApp">
        <div class="home-screen" id="homeScreen">
            <div class="home-header">
                <h1>SOC.</h1>
                <span id="status">OFFLINE</span>
            </div>
            
            <div class="home-scrollable">
                <div class="main-profile-card" id="mainProfileBtn">
                    <div class="avatar-large"><img id="homeAvatarImg" src="image/ava1.png"></div>
                    <div class="main-nick" id="homeNick">---</div>
                    <div class="main-status" id="homeStatus">online</div>
                </div>
                
                <div id="activeChatRow" class="active-chat-row">
                    <div class="active-chat-left" id="activeChatTap">
                        <div class="active-chat-avatar"><img id="activeChatAvatar" src="image/ava1.png"></div>
                        <div class="active-chat-info">
                            <div class="active-chat-nick" id="activeChatNick">friend</div>
                            <div class="active-chat-lastmsg" id="activeChatLastMsg">---</div>
                        </div>
                    </div>
                    <button class="close-chat-icon" id="closeChatFromHomeBtn">
                        <img src="image/close.png" alt="✕">
                    </button>
                </div>
                
                <div id="connectSection" class="connect-section">
                    <div class="connect-row">
                        <input type="text" id="peer-nick-input" placeholder="friend's nickname..." autocomplete="off">
                        <button class="connect-btn" onclick="connectToPeer()">CONNECT</button>
                    </div>
                </div>
                
                <div id="notConnectedPlaceholder" class="not-connect-placeholder">
                    <span>NOT CONNECTED</span>
                </div>
            </div>
            
            <div class="rules-bottom-btn" onclick="showRules()">RULES & DISCLAIMER</div>
        </div>

        <div class="chat-screen" id="chatScreen">
            <div class="chat-header">
                <button class="back-home-btn" id="backHomeBtn">
                    <img src="image/back.png" alt="←">
                </button>
                <div class="chat-peer-info-center">
                    <div class="peer-info-button" id="peerInfoBtn">
                        <div class="peer-info-avatar"><img id="peerAvatarImg" src="https://i.pravatar.cc/100?img=1"></div>
                        <div class="peer-info-nick" id="peerNickChat">friend</div>
                    </div>
                </div>
                <div class="placeholder-right"></div>
            </div>
            <div id="chatMessages"></div>
            <div class="input-area">
                <button class="btn-icon" onclick="document.getElementById('fileInput').click()"><img src="image/plus.png" alt="+" class="btn-img"></button>
                <button class="btn-icon" id="recordBtn" onclick="toggleRecord()"><img src="image/mic.png" alt="V" class="btn-img" id="mic-icon"></button>
                <input type="text" id="msgInput" placeholder="Message..." onkeypress="if(event.key==='Enter') sendText()" autocomplete="off">
                <button class="btn-icon send-btn" onclick="sendText()"><img src="image/send.png" alt=">" class="btn-img"></button>
            </div>
        </div>
    </div>
</div>

<div id="modal-overlay" class="modal-overlay"><div class="modal"><div id="modal-text"></div><div class="modal-btns" id="modal-actions"></div></div></div>

<div id="registrationModal" class="modal-overlay">
    <div class="modal">
        <div style="font-weight:600; margin-bottom:8px;">ENTER YOUR NICKNAME</div>
        <input type="text" id="regNickInput" class="nick-input-modal" placeholder="3-20 characters (a-z, 0-9, _)" maxlength="20">
        <button class="modal-btn" id="regSubmitBtn" style="width:100%">REGISTRATION</button>
    </div>
</div>

<div id="profileModal" class="modal-overlay">
    <div class="modal">
        <div style="font-weight:600; margin-bottom:8px;">Edit Profile</div>
        <div class="modal-avatar-container" id="modalAvatarClickArea">
            <div class="avatar-large" style="width:80px; height:80px; margin:0;"><img id="modalAvatarImg"></div>
            <div class="modal-edit-icon">✎</div>
        </div>
        <input type="text" id="modalNickInput" class="nick-input-modal" placeholder="Nickname (3-20 chars: a-z, 0-9, _)">

            <option value="away">away</option>
            <option value="do not disturb">do not disturb</option>

            <option value="studying">studying</option>

            <button class="modal-btn" id="cancelProfileBtn" style="background:#1f1f1f;">CANCEL</button>

        <div style="font-weight:600; margin-bottom:10px;">Choose Avatar</div>

        <div class="flex-btns">
            <button class="modal-btn" id="cancelAvatarBtn" style="background:#1f1f1f;">CANCEL</button>

<div id="peerProfileModal" class="modal-overlay">
    <div class="modal">
        <div class="avatar-large" style="margin:0 auto 15px;"><img id="peerModalAvatar"></div>
        <div style="font-size:1.3rem; font-weight:600;" id="peerModalNick"></div>

    </div>

<input type="file" id="fileInput" hidden accept="image/*" onchange="sendFile(this.files[0])">

<script>
    let myNick = localStorage.getItem('soc-nickname');
    let myAvatar = localStorage.getItem('soc-avatar') || 'image/ava1.png';
    let myStatus = localStorage.getItem('soc-status') || 'online';
    let peer = null;
    let conn = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let activeStream = null;
    let lastDateLabel = "";
    let connectedNick = null;
    let connectedAvatar = null;
    let connectedStatus = null;
    let lastMessageText = "---";
    
    const homeScreen = document.getElementById('homeScreen');
    const chatScreen = document.getElementById('chatScreen');
    const homeNickSpan = document.getElementById('homeNick');
    const homeStatusSpan = document.getElementById('homeStatus');
    const homeAvatarImg = document.getElementById('homeAvatarImg');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const peerNickChat = document.getElementById('peerNickChat');
    const peerAvatarChat = document.getElementById('peerAvatarImg');
    const activeChatRow = document.getElementById('activeChatRow');
    const activeChatAvatar = document.getElementById('activeChatAvatar');
    const activeChatNick = document.getElementById('activeChatNick');
    const activeChatLastMsg = document.getElementById('activeChatLastMsg');
    const connectSection = document.getElementById('connectSection');
    const notConnectedPlaceholder = document.getElementById('notConnectedPlaceholder');
    
    const avatarList = ['image/ava1.png','image/ava2.jpg','image/ava3.png','image/ava4.png','image/ava5.jpeg','image/ava6.jpg','image/ava7.jpg','image/ava8.jpg','image/ava9.gif','image/ava10.gif'];
    
    function formatLastMessage(type, data) {
        if (type === 'text') return data.length > 30 ? data.substring(0, 27) + '...' : data;
        if (type === 'image') return '✿ Photo';
        if (type === 'audio') return '♪ Voice message';
        return '---';
    }
    
    function updateLastMessage(type, data) {
        lastMessageText = formatLastMessage(type, data);
        if (activeChatLastMsg) activeChatLastMsg.innerText = lastMessageText;
    }
    
    function updateHomeUI() {
        homeNickSpan.innerText = myNick || '---';
        homeStatusSpan.innerText = myStatus;
        homeAvatarImg.src = myAvatar;
    }
    
    function updateUIForConnectionState(hasActiveChat) {
        if (hasActiveChat && connectedNick && conn && conn.open) {
            activeChatRow.style.display = 'flex';
            connectSection.style.display = 'none';
            notConnectedPlaceholder.style.display = 'none';
            activeChatNick.innerText = connectedNick;
            activeChatAvatar.src = connectedAvatar || 'image/ava1.png';
            activeChatLastMsg.innerText = lastMessageText;
        } else {
            activeChatRow.style.display = 'none';
            connectSection.style.display = 'block';
            notConnectedPlaceholder.style.display = 'flex';
        }
    }
    
    function updateChatHeader() {
        peerNickChat.innerText = connectedNick || 'friend';
        peerAvatarChat.src = connectedAvatar || 'image/ava1.png';
    }
    
    function isValidNick(nick) {
        if (!nick || nick.length < 3) return false;
        return /^[a-zA-Z0-9_]{3,20}$/.test(nick);
    }
    
    function showValidationError(returnToModal) {
        const overlay = document.getElementById('modal-overlay');
        const txtDiv = document.getElementById('modal-text');
        txtDiv.style.textAlign = 'center';
        txtDiv.innerHTML = `Nickname must be 3-20 characters (letters, numbers, _)`;
        const actionsDiv = document.getElementById('modal-actions');
        actionsDiv.innerHTML = `<button class="modal-btn" id="errorOkBtn" style="width:100%">OK</button>`;
        overlay.style.display = 'flex';
        document.getElementById('errorOkBtn').onclick = () => {
            overlay.style.display = 'none';
            if (returnToModal === 'registration') {
                document.getElementById('registrationModal').style.display = 'flex';
                document.getElementById('regNickInput').value = '';
                document.getElementById('regNickInput').focus();
            } else if (returnToModal === 'profile') {
                document.getElementById('profileModal').style.display = 'flex';
            }
        };
    }
    
    function showNicknameTakenError(returnToModal) {
        const overlay = document.getElementById('modal-overlay');
        const txtDiv = document.getElementById('modal-text');
        txtDiv.style.textAlign = 'center';
        txtDiv.innerHTML = `<b style="color:white; display:block; margin-bottom:10px;">Nickname already taken! Choose another one.</b>`;
        const actionsDiv = document.getElementById('modal-actions');
        actionsDiv.innerHTML = `<button class="modal-btn" id="errorOkBtn" style="width:100%">OK</button>`;
        overlay.style.display = 'flex';
        document.getElementById('errorOkBtn').onclick = () => {
            overlay.style.display = 'none';
            if (returnToModal === 'registration') {
                document.getElementById('registrationModal').style.display = 'flex';
                document.getElementById('regNickInput').value = '';
                document.getElementById('regNickInput').focus();
            } else if (returnToModal === 'profile') {
                document.getElementById('profileModal').style.display = 'flex';
            }
        };
    }
    
    function showRegistrationModal() {
        document.getElementById('regNickInput').value = '';
        document.getElementById('registrationModal').style.display = 'flex';
        setTimeout(() => document.getElementById('regNickInput').focus(), 100);
    }
    
    function applyNicknameChange(newNick, newAvatar, newStatus, fromProfile = true) {
        if (peer) peer.destroy();
        myNick = newNick;
        myAvatar = newAvatar;
        myStatus = newStatus;
        localStorage.setItem('soc-nickname', myNick);
        localStorage.setItem('soc-avatar', myAvatar);
        localStorage.setItem('soc-status', myStatus);
        updateHomeUI();
        
        peer = new Peer(myNick, { debug: 2 });
        peer.on('open', () => { 
            updateStatus('ONLINE', '#da8f27');
            if (conn && conn.open) {
                conn.send({ type: 'profile', nick: myNick, avatar: myAvatar, status: myStatus });
            }
        });
        peer.on('error', (err) => { 
            console.warn(err);
            updateStatus('ERROR', '#aa5555');
            if (err.type === 'unavailable-id') {
                if (fromProfile) {
                    showNicknameTakenError('profile');
                } else {
                    showNicknameTakenError('registration');
                }
                myNick = localStorage.getItem('soc-nickname');
                myAvatar = localStorage.getItem('soc-avatar') || 'image/ava1.png';
                myStatus = localStorage.getItem('soc-status') || 'online';
                updateHomeUI();
                if (peer) peer.destroy();
                peer = new Peer(myNick, { debug: 2 });
            }
        });
        peer.on('connection', (incomingConn) => {
            if (conn && (conn.open || conn.peerConnection)) { incomingConn.close(); return; }
            conn = incomingConn;
            setupConnection();
        });
    }
    
    function startWithNick(nick, fromRegistration = true) {
        if (peer) peer.destroy();
        peer = new Peer(nick, { debug: 2 });
        peer.on('open', () => { 
            updateStatus('ONLINE', '#da8f27');
            if (fromRegistration) {
                myNick = nick;
                localStorage.setItem('soc-nickname', myNick);
                updateHomeUI();
            }
        });
        peer.on('error', (err) => { 
            console.warn(err);
            updateStatus('ERROR', '#aa5555');
            if (err.type === 'unavailable-id') {
                if (fromRegistration) {
                    document.getElementById('registrationModal').style.display = 'none';
                    showNicknameTakenError('registration');
                }
            }
        });
        peer.on('connection', (incomingConn) => {
            if (conn && (conn.open || conn.peerConnection)) { incomingConn.close(); return; }
            conn = incomingConn;
            setupConnection();
        });
        updateStatus('ONLINE', '#da8f27');
    }
    
    function setupConnection() {
        if (!conn) return;
        conn.on('open', () => {
            conn.send({ type: 'profile', nick: myNick, avatar: myAvatar, status: myStatus });
            chatMessagesDiv.innerHTML = '';
            lastDateLabel = '';
            lastMessageText = "---";
            updateUIForConnectionState(true);
            updateStatus(`CHAT WITH: ${connectedNick || 'friend'}`, '#559b61');
            switchToChatMode();
        });
        conn.on('data', (payload) => {
            if (payload && payload.type) {
                if (payload.type === 'profile') {
                    connectedNick = payload.nick;
                    connectedAvatar = payload.avatar;
                    connectedStatus = payload.status || 'user';
                    updateChatHeader();
                    updateUIForConnectionState(true);
                    updateStatus(`CHAT WITH: ${connectedNick}`, '#559b61');
                } else if (payload.type === 'clear') {
                    localStorage.removeItem('soc-c-media-history');
                    chatMessagesDiv.innerHTML = '';
                    lastDateLabel = '';
                } else if (payload.type === 'peer_closed_chat') {
                    showAlert(`${payload.nick || 'Friend'} closed the chat`);
                    fullCloseChat();
                } else if (payload.type === 'text' || payload.type === 'image' || payload.type === 'audio') {
                    if (payload.type === 'text') updateLastMessage('text', payload.data);
                    else if (payload.type === 'image') updateLastMessage('image', null);
                    else if (payload.type === 'audio') updateLastMessage('audio', null);
                    addMsg(payload.data, 'other', payload.type, true);
                }
            }
        });
        conn.on('close', () => {
            fullCloseChat();
        });
    }
    
    function fullCloseChat() {
        if (conn && conn.open) {
            try { conn.send({ type: 'peer_closed_chat', nick: myNick }); } catch(e) {}
            conn.close();
        }
        conn = null;
        connectedNick = null;
        connectedAvatar = null;
        connectedStatus = null;
        lastMessageText = "---";
        updateUIForConnectionState(false);
        updateStatus('ONLINE', '#da8f27');
        chatMessagesDiv.innerHTML = '';
        lastDateLabel = '';
        switchToHomeMode();
    }
    
    function connectToPeer() {
        if (!peer) { showAlert("Initializing..."); return; }
        const friendNick = document.getElementById('peer-nick-input').value.trim();
        if (!friendNick) { showAlert("Enter friend's nickname"); return; }
        if (friendNick === myNick) { showAlert("You cannot connect to yourself"); return; }
        if (conn && conn.open) { conn.close(); }
        chatMessagesDiv.innerHTML = '';
        lastDateLabel = '';
        lastMessageText = "---";
        updateStatus('CONNECTING...', '#b0b0b0');
        const newConn = peer.connect(friendNick);
        conn = newConn;
        setupConnection();
    }
    
    function addMsg(data, side, type, saveToStorage = true, savedTime = null) {
        const container = chatMessagesDiv;
        if (!container) return;
        if (side === 'my') {
            if (type === 'text') updateLastMessage('text', data);
            else if (type === 'image') updateLastMessage('image', null);
            else if (type === 'audio') updateLastMessage('audio', null);
        }
        const now = savedTime ? new Date(savedTime) : new Date();
        const dateOptions = { day: 'numeric', month: 'long' };
        const currentDateLabel = now.toLocaleDateString('en-US', dateOptions);
        if (currentDateLabel !== lastDateLabel) {
            const dateDiv = document.createElement('div'); dateDiv.className = 'date-divider'; dateDiv.innerText = currentDateLabel;
            container.appendChild(dateDiv);
            lastDateLabel = currentDateLabel;
        }
        const msgDiv = document.createElement('div'); msgDiv.className = `msg ${side === 'my' ? 'my' : 'other'}`;
        const content = document.createElement('div');
        if (type === 'text') content.innerText = data;
        else if (type === 'image') { const img = document.createElement('img'); img.src = data; content.appendChild(img); }
        else if (type === 'audio') { const audioEl = document.createElement('audio'); audioEl.controls = true; audioEl.src = data; content.appendChild(audioEl); }
        msgDiv.appendChild(content);
        const timeDiv = document.createElement('div'); timeDiv.className = 'msg-time';
        timeDiv.innerText = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        msgDiv.appendChild(timeDiv);
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
        if (side === 'other' && !savedTime) { const sound = document.getElementById('msgSound'); if(sound) sound.play().catch(e=>{}); }
        if (saveToStorage) {
            const history = JSON.parse(localStorage.getItem('soc-c-media-history') || '[]');
            history.push({ data, side, type, time: now.getTime() });
            if (history.length > 50) history.shift();
            localStorage.setItem('soc-c-media-history', JSON.stringify(history));
        }
    }
    
    function loadHistory() {
        const raw = localStorage.getItem('soc-c-media-history');
        if (!raw) return;
        try {
            const history = JSON.parse(raw);
            if (history.length > 0) {
                chatMessagesDiv.innerHTML = "";
                lastDateLabel = "";
                history.forEach(item => addMsg(item.data, item.side, item.type, false, item.time));
                const lastMsg = history[history.length - 1];
                if (lastMsg) updateLastMessage(lastMsg.type, lastMsg.data);
            }
        } catch(e) { console.error("History load error", e); }
    }
    
    function updateStatus(text, colorHint) {
        const st = document.getElementById('status');
        st.innerText = text.toUpperCase();
        st.style.color = colorHint || '#bbb';
    }
    
function sendText() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (text === "") return;
    
    if (conn && conn.open) {
        conn.send({ type: 'text', data: text });
        addMsg(text, 'my', 'text', true);
        input.value = '';
    }
}

function sendFile(file) {
    if (!file) return;
    
    if (conn && conn.open) {
        const reader = new FileReader();
        reader.onload = (ev) => { 
            conn.send({ type: 'image', data: ev.target.result }); 
            addMsg(ev.target.result, 'my', 'image', true); 
        };
        reader.readAsDataURL(file);
    }
}
    
    async function toggleRecord() {
        const btn = document.getElementById('recordBtn');
        const micImg = document.getElementById('mic-icon');
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            if (activeStream) { activeStream.getTracks().forEach(track => track.stop()); activeStream = null; }
            btn.classList.remove('btn-red');
            if (micImg) micImg.src = "image/mic.png";
            return;
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            activeStream = stream;
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = (ev) => { if (conn && conn.open) conn.send({ type: 'audio', data: ev.target.result }); addMsg(ev.target.result, 'my', 'audio', true); };
                reader.readAsDataURL(blob);
            };
            mediaRecorder.start();
            btn.classList.add('btn-red');
            if (micImg) micImg.src = "image/stop.png";
        } catch(err) { showAlert("Mic access denied"); }
    }
    
    function showAlert(msg, callback) {
        const overlay = document.getElementById('modal-overlay');
        document.getElementById('modal-text').innerText = msg;
        const actionsDiv = document.getElementById('modal-actions');
        actionsDiv.innerHTML = `<button class="modal-btn" id="alertOkBtn">OK</button>`;
        overlay.style.display = 'flex';
        document.getElementById('alertOkBtn').onclick = () => {
            overlay.style.display = 'none';
            if (callback) callback();
        };
    }
    
    function showRules() {
        const overlay = document.getElementById('modal-overlay');
        const txtDiv = document.getElementById('modal-text');
        txtDiv.style.textAlign = 'left';
        txtDiv.innerHTML = `<b style="color:white; display:block; margin-bottom:10px;">Legal Disclaimer</b>
        This application uses P2P (Peer-to-Peer) technology. All data is transferred directly between devices.<br><br>
        The developer does NOT store, monitor, or have access to your conversations. Therefore, the developer is NOT responsible for user behavior or content shared.<br><br>
        This tool was created for good purposes and privacy. Please use it responsibly.`;
        document.getElementById('modal-actions').innerHTML = `<button class="modal-btn" id="rulesOkBtn" style="width:100%">I UNDERSTAND</button>`;
        overlay.style.display = 'flex';
        document.getElementById('rulesOkBtn').onclick = () => { overlay.style.display = 'none'; };
    }
    
    document.getElementById('regSubmitBtn').onclick = () => {
        const newNick = document.getElementById('regNickInput').value.trim();
        if (!isValidNick(newNick)) {
            document.getElementById('registrationModal').style.display = 'none';
            showValidationError('registration');
            return;
        }
        document.getElementById('registrationModal').style.display = 'none';
        startWithNick(newNick, true);
    };
    
    let tempAvatar = myAvatar;
    let tempStatus = myStatus;
    let tempNick = myNick;
    
    function openProfileModal() {
        tempNick = myNick;
        tempAvatar = myAvatar;
        tempStatus = myStatus;
        document.getElementById('modalNickInput').value = myNick;
        document.getElementById('modalAvatarImg').src = myAvatar;
        document.getElementById('modalStatusSelect').value = myStatus;
        document.getElementById('profileModal').style.display = 'flex';
    }
    
    function openAvatarSelectionModal() {
        selectedAvatarTemp = tempAvatar;
        buildAvatarGridForSelection();
        document.getElementById('avatarSelectModal').style.display = 'flex';
    }
    
    let selectedAvatarTemp = myAvatar;
    function buildAvatarGridForSelection() {
        const grid = document.getElementById('avatarGrid');
        grid.innerHTML = '';
        avatarList.forEach(av => {
            const div = document.createElement('div'); div.className = 'avatar-option';
            if(selectedAvatarTemp === av) div.classList.add('selected');
            const img = document.createElement('img'); img.src = av; div.appendChild(img);
            div.onclick = () => {
                document.querySelectorAll('#avatarGrid .avatar-option').forEach(opt => opt.classList.remove('selected'));
                div.classList.add('selected');
                selectedAvatarTemp = av;
            };
            grid.appendChild(div);
        });
    }
    
    document.getElementById('mainProfileBtn').addEventListener('click', openProfileModal);
    document.getElementById('modalAvatarClickArea').onclick = (e) => { e.stopPropagation(); openAvatarSelectionModal(); };
    
    document.getElementById('saveAvatarBtn').onclick = () => {
        tempAvatar = selectedAvatarTemp;
        document.getElementById('modalAvatarImg').src = tempAvatar;
        document.getElementById('avatarSelectModal').style.display = 'none';
    };
    document.getElementById('cancelAvatarBtn').onclick = () => {
        selectedAvatarTemp = tempAvatar;
        document.getElementById('avatarSelectModal').style.display = 'none';
    };
    document.getElementById('cancelProfileBtn').onclick = () => { document.getElementById('profileModal').style.display = 'none'; };
    
    document.getElementById('saveProfileBtn').onclick = () => {
        let newNick = document.getElementById('modalNickInput').value.trim();
        let newAvatar = tempAvatar;
        let newStatus = document.getElementById('modalStatusSelect').value;
        
        if (newNick === myNick || newNick === "") {
            myAvatar = newAvatar;
            myStatus = newStatus;
            localStorage.setItem('soc-avatar', myAvatar);
            localStorage.setItem('soc-status', myStatus);
            updateHomeUI();
            if (conn && conn.open) conn.send({ type: 'profile', nick: myNick, avatar: myAvatar, status: myStatus });
            document.getElementById('profileModal').style.display = 'none';
            return;
        }
        
        if (!isValidNick(newNick)) {
            document.getElementById('profileModal').style.display = 'none';
            showValidationError('profile');
            return;
        }
        
        document.getElementById('profileModal').style.display = 'none';
        
        let oldNick = myNick;
        let oldAvatar = myAvatar;
        let oldStatus = myStatus;
        let oldPeer = peer;
        
        myNick = newNick;
        myAvatar = newAvatar;
        myStatus = newStatus;
        localStorage.setItem('soc-nickname', myNick);
        localStorage.setItem('soc-avatar', myAvatar);
        localStorage.setItem('soc-status', myStatus);
        updateHomeUI();
        
        if (peer) peer.destroy();
        peer = new Peer(myNick, { debug: 2 });
        
        peer.on('open', () => {
            updateStatus('ONLINE', '#da8f27');
            if (conn && conn.open) {
                conn.send({ type: 'profile', nick: myNick, avatar: myAvatar, status: myStatus });
            }
        });
        
        peer.on('error', (err) => {
            console.warn(err);
            if (err.type === 'unavailable-id') {
                myNick = oldNick;
                myAvatar = oldAvatar;
                myStatus = oldStatus;
                localStorage.setItem('soc-nickname', myNick);
                localStorage.setItem('soc-avatar', myAvatar);
                localStorage.setItem('soc-status', myStatus);
                updateHomeUI();
                if (peer) peer.destroy();
                peer = oldPeer;
                if (oldPeer) {
                    oldPeer.on('connection', (incomingConn) => {
                        if (conn && (conn.open || conn.peerConnection)) { incomingConn.close(); return; }
                        conn = incomingConn;
                        setupConnection();
                    });
                }
                showNicknameTakenError('profile');
            }
        });
        
        peer.on('connection', (incomingConn) => {
            if (conn && (conn.open || conn.peerConnection)) { incomingConn.close(); return; }
            conn = incomingConn;
            setupConnection();
        });
    };
    
    function openPeerProfile() {
        if(connectedNick) {
            document.getElementById('peerModalAvatar').src = connectedAvatar || 'https://i.pravatar.cc/100';
            document.getElementById('peerModalNick').innerText = connectedNick;
            document.getElementById('peerModalStatus').innerText = connectedStatus || 'user';
            document.getElementById('peerProfileModal').style.display = 'flex';
        }
    }
    document.getElementById('closePeerModal').onclick = () => document.getElementById('peerProfileModal').style.display = 'none';
    
    function switchToChatMode() {
        homeScreen.classList.add('chat-open');
        chatScreen.classList.add('chat-visible');
        setTimeout(() => {
            document.getElementById('msgInput').focus();
        }, 200);
    }
    
    function switchToHomeMode() {
        homeScreen.classList.remove('chat-open');
        chatScreen.classList.remove('chat-visible');
        setTimeout(() => {
            updateUIForConnectionState(!!(connectedNick && conn && conn.open));
        }, 300);
    }
    
    function askCloseChat() {
        if(!conn || !conn.open) return;
        const overlay = document.getElementById('modal-overlay');
        document.getElementById('modal-text').innerText = "Close chat?";
        const actionsDiv = document.getElementById('modal-actions');
        actionsDiv.innerHTML = `<button class="modal-btn" id="confirmNo">CANCEL</button><button class="modal-btn" id="confirmYes">YES, CLOSE</button>`;
        overlay.style.display = 'flex';
        document.getElementById('confirmNo').onclick = () => overlay.style.display = 'none';
        document.getElementById('confirmYes').onclick = () => {
            overlay.style.display = 'none';
            fullCloseChat();
        };
    }
    
    document.getElementById('backHomeBtn').addEventListener('click', switchToHomeMode);
    document.getElementById('closeChatFromHomeBtn').addEventListener('click', askCloseChat);
    document.getElementById('activeChatTap').addEventListener('click', () => { if(connectedNick && conn && conn.open) switchToChatMode(); });
    document.getElementById('peerInfoBtn').addEventListener('click', openPeerProfile);
    
    if(!myNick || !isValidNick(myNick)) {
        showRegistrationModal();
    } else {
        startWithNick(myNick, false);
        updateHomeUI();
    }
    loadHistory();
    updateUIForConnectionState(false);
    
    setTimeout(() => {
        document.getElementById('preloader').classList.add('hide-preloader');
        document.getElementById('mainApp').classList.add('app-visible');
    }, 2000);
    
    window.addEventListener('beforeunload', () => { if(conn && conn.open) conn.close(); if(peer) peer.destroy(); });
</script>
</body>
</html>
