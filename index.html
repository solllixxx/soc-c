<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SOC">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <title>SOC.</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --gray-light: #888888;
            --gray-dark: #1a1a1a;
            --gray-border: #333333;
            --msg-sent: #2b2b2b;
            --msg-recv: #141414;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 100dvh решает проблему с клавиатурой и адресной строкой на мобильных */
        body, html {
            width: 100%;
            height: 100dvh; 
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        #mainApp {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100dvh;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .app-visible {
            opacity: 1 !important;
        }

        /* Экраны */
        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        .screen.active {
            display: flex;
        }

        /* Шапка */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--gray-border);
            flex-shrink: 0;
        }
        
        .header h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        button {
            background-color: var(--gray-dark);
            color: var(--text-color);
            border: 1px solid var(--gray-border);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--gray-border); }

        input {
            width: 100%;
            padding: 12px;
            background-color: var(--gray-dark);
            border: 1px solid var(--gray-border);
            color: var(--text-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: var(--gray-light); }

        /* Контейнер чатов */
        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-bubble {
            max-width: 75%;
            padding: 12px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
            position: relative;
        }
        .msg-sent {
            align-self: flex-end;
            background-color: var(--msg-sent);
            border-bottom-right-radius: 2px;
        }
        .msg-recv {
            align-self: flex-start;
            background-color: var(--msg-recv);
            border: 1px solid var(--gray-border);
            border-bottom-left-radius: 2px;
        }
        
        .msg-time {
            font-size: 0.7rem;
            color: var(--gray-light);
            margin-top: 5px;
            text-align: right;
            display: block;
        }

        /* Поле ввода */
        .input-area {
            display: flex;
            padding: 10px 15px;
            background-color: var(--bg-color);
            border-top: 1px solid var(--gray-border);
            gap: 10px;
            flex-shrink: 0;
        }

        /* Главный экран (Контакты) */
        .contact-form {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-online { background-color: #4caf50; }
        .status-offline { background-color: #f44336; }

        /* Модалка регистрации */
        #registrationModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-content {
            padding: 30px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .modal-content input { margin: 20px 0; text-align: center; }
    </style>
</head>
<body>

    <div id="registrationModal" style="display: none;">
        <div class="modal-content">
            <h2>Ваш ID (Ник)</h2>
            <input type="text" id="regNick" placeholder="Придумайте логин..." autocomplete="off">
            <button onclick="register()">Войти</button>
        </div>
    </div>

    <div id="mainApp">
        
        <div id="homeScreen" class="screen active">
            <div class="header">
                <h2>SOC.</h2>
                <span id="myIdDisplay" style="color: var(--gray-light); font-size: 0.8rem;"></span>
            </div>
            <div class="contact-form">
                <p style="color: var(--gray-light); font-size: 0.9rem;">Введите ID собеседника для чата (сообщения отправятся даже если он не в сети, и доставятся при подключении):</p>
                <input type="text" id="peerIdInput" placeholder="ID собеседника...">
                <button onclick="openChatWithInput()">Перейти в чат</button>
            </div>
        </div>

        <div id="chatScreen" class="screen">
            <div class="header">
                <button onclick="goBack()">&#8592; Назад</button>
                <div style="text-align: center;">
                    <h2 id="chatWithTitle">Chat</h2>
                    <div style="font-size: 0.7rem; color: var(--gray-light); margin-top: 4px;">
                        <span id="connStatusDot" class="status-dot status-offline"></span>
                        <span id="connStatusText">Offline</span>
                    </div>
                </div>
                <div style="width: 70px;"></div> </div>
            
            <div id="chatMessages">
                </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off" onkeypress="handleEnter(event)">
                <button onclick="sendMessageUI()">Отправить</button>
            </div>
        </div>

    </div>

<script>
    // ========== ИНИЦИАЛИЗАЦИЯ И СОСТОЯНИЕ ==========
    let myNick = localStorage.getItem('myNick');
    let peer = null;
    let currentConn = null;
    let currentChatPeer = null;
    let isConnected = false;
    
    // Структура хранилища чатов: { peerId: [ {id, sender, text, timestamp}, ... ] }
    let chatHistory = JSON.parse(localStorage.getItem('soc_chats')) || {};

    // Запуск приложения
    window.onload = () => {
        if (!myNick) {
            document.getElementById('registrationModal').style.display = 'flex';
        } else {
            startPeer(myNick);
        }
        setTimeout(() => {
            document.getElementById('mainApp').classList.add('app-visible');
        }, 100);
    };

    function register() {
        const nick = document.getElementById('regNick').value.trim();
        if (nick.length > 2) {
            myNick = nick;
            localStorage.setItem('myNick', myNick);
            document.getElementById('registrationModal').style.display = 'none';
            startPeer(myNick);
        }
    }

    // ========== PEERJS ЛОГИКА ==========
    function startPeer(nick) {
        document.getElementById('myIdDisplay').innerText = `Мой ID: ${nick}`;
        peer = new Peer(nick, {
            debug: 2
        });

        peer.on('open', (id) => {
            console.log('My peer ID is: ' + id);
        });

        // Когда к нам подключаются
        peer.on('connection', (conn) => {
            handleConnection(conn);
        });

        peer.on('error', (err) => {
            console.error(err);
            if(err.type === 'peer-unavailable') {
                updateStatus(false);
            }
        });
    }

    // Подключение к собеседнику
    function connectTo(peerId) {
        if (!peer) return;
        if (currentConn) currentConn.close();
        
        updateStatus(false, 'Соединение...');
        const conn = peer.connect(peerId, { reliable: true });
        handleConnection(conn);
    }

    // Общая обработка соединения (входящего или исходящего)
    function handleConnection(conn) {
        currentConn = conn;

        conn.on('open', () => {
            isConnected = true;
            updateStatus(true);
            
            // ВАЖНО: При установке соединения синхронизируем историю сообщений!
            syncMessages(conn.peer);
        });

        conn.on('data', (data) => {
            // Если пришел запрос на синхронизацию
            if (data.type === 'sync') {
                mergeHistory(conn.peer, data.history);
            } 
            // Если пришло обычное сообщение
            else if (data.type === 'msg') {
                saveMessageLocally(conn.peer, data.msg);
                if (currentChatPeer === conn.peer) renderChat();
            }
        });

        conn.on('close', () => {
            isConnected = false;
            updateStatus(false);
        });
        
        conn.on('error', () => {
            isConnected = false;
            updateStatus(false);
        });
    }

    function updateStatus(online, text) {
        const dot = document.getElementById('connStatusDot');
        const txt = document.getElementById('connStatusText');
        if (online) {
            dot.className = 'status-dot status-online';
            txt.innerText = text || 'Online';
        } else {
            dot.className = 'status-dot status-offline';
            txt.innerText = text || 'Offline';
        }
    }

    // ========== ЛОГИКА ОФЛАЙН/СИНХРОНИЗАЦИИ ==========

    // Сохранение сообщения в локальную базу данных
    function saveMessageLocally(peerId, msgObj) {
        if (!chatHistory[peerId]) chatHistory[peerId] = [];
        
        // Проверяем, нет ли уже такого сообщения (чтобы избежать дублей при синхронизации)
        const exists = chatHistory[peerId].find(m => m.id === msgObj.id);
        if (!exists) {
            chatHistory[peerId].push(msgObj);
            // Сортируем по времени
            chatHistory[peerId].sort((a, b) => a.timestamp - b.timestamp);
            localStorage.setItem('soc_chats', JSON.stringify(chatHistory));
            return true;
        }
        return false;
    }

    // Отправка своей базы данных собеседнику для сверки
    function syncMessages(peerId) {
        if (isConnected && currentConn && currentConn.open) {
            const history = chatHistory[peerId] || [];
            currentConn.send({
                type: 'sync',
                history: history
            });
        }
    }

    // Слияние чужой базы со своей (вызывается при получении 'sync')
    function mergeHistory(peerId, incomingHistory) {
        let hasNew = false;
        incomingHistory.forEach(msg => {
            if (saveMessageLocally(peerId, msg)) {
                hasNew = true;
            }
        });
        // Если при слиянии появились новые сообщения, обновляем UI
        if (hasNew && currentChatPeer === peerId) {
            renderChat();
        }
    }

    // ========== UI И ВЗАИМОДЕЙСТВИЕ ==========

    function openChatWithInput() {
        const peerId = document.getElementById('peerIdInput').value.trim();
        if (!peerId) return;
        openChat(peerId);
    }

    function openChat(peerId) {
        currentChatPeer = peerId;
        document.getElementById('chatWithTitle').innerText = peerId;
        document.getElementById('homeScreen').classList.remove('active');
        document.getElementById('chatScreen').classList.add('active');
        
        // Загружаем сохраненные офлайн/онлайн сообщения
        renderChat();
        
        // Пытаемся подключиться (в фоне)
        connectTo(peerId);
    }

    function goBack() {
        currentChatPeer = null;
        if (currentConn) currentConn.close();
        document.getElementById('chatScreen').classList.remove('active');
        document.getElementById('homeScreen').classList.add('active');
    }

    function handleEnter(e) {
        if (e.key === 'Enter') sendMessageUI();
    }

    function sendMessageUI() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatPeer) return;

        // 1. Создаем объект сообщения
        const msgObj = {
            id: Date.now() + '_' + myNick,
            sender: myNick,
            text: text,
            timestamp: Date.now()
        };

        // 2. СРАЗУ сохраняем локально и рисуем (даже если офлайн)
        saveMessageLocally(currentChatPeer, msgObj);
        renderChat();
        input.value = '';

        // 3. Если сейчас онлайн — отправляем. Если нет — оно уйдет при следующем syncMessages()
        if (isConnected && currentConn && currentConn.open) {
            currentConn.send({ type: 'msg', msg: msgObj });
        }
    }

    function renderChat() {
        const container = document.getElementById('chatMessages');
        container.innerHTML = '';
        
        const history = chatHistory[currentChatPeer] || [];
        
        history.forEach(msg => {
            const div = document.createElement('div');
            const isMe = msg.sender === myNick;
            div.className = `msg-bubble ${isMe ? 'msg-sent' : 'msg-recv'}`;
            
            const textSpan = document.createElement('span');
            textSpan.innerText = msg.text;
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'msg-time';
            const date = new Date(msg.timestamp);
            timeSpan.innerText = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            
            div.appendChild(textSpan);
            div.appendChild(timeSpan);
            container.appendChild(div);
        });

        // Скролл вниз
        container.scrollTop = container.scrollHeight;
    }

    // Регистрация Service Worker для PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(reg => {
            console.log('SW registered:', reg);
        }).catch(err => {
            console.log('SW error:', err);
        });
    }
</script>
</body>
</html>
