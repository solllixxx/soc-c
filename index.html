.modal {
    background: #111111;
    padding: 22px 18px;
    border-radius: 32px;
    width: 100%;
    max-width: 300px;
    text-align: center;
    border: 1px solid #333;
    animation: modalPopIn 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    transform-origin: center;
    will-change: transform, opacity; /* Добавить - оптимизация */
    backface-visibility: hidden; /* Добавить - убирает мерцание */
}

/* Текст во всех модалках по центру */
.modal, .modal * {
    text-align: center !important;
}

/* Но выпадающий список статуса - по левому краю */
.modal .status-select {
    text-align: left !important;
}

/* Чтобы стрелка выпадающего списка тоже была слева (опционально) */
.modal .status-select option {
    text-align: left !important;
}

@keyframes modalPopIn {
    0% {
        opacity: 0;
        transform: scale(0.95);
    }
    100% {
        opacity: 1;
        transform: scale(1);
    }
}

@keyframes modalPopOut {
    0% {
        opacity: 1;
        transform: scale(1);
    }
    100% {
        opacity: 0;
        transform: scale(0.95);
    }
}

.modal-exit {
    animation: modalPopOut 0.15s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
}

/* Запрещаем выделение всего текста на сайте */

/* Разрешаем выделение ТОЛЬКО в сообщениях чата */

/* === ДОПОЛНИТЕЛЬНАЯ ЗАЩИТА ОТ ВЫРЕЗОВ === */

.has-notch .chat-header {

/* Защита для статус-бара на Android с вырезом */
@media (display-cutout: none) {

}

/* Специально для iOS с Dynamic Island */

/* Для экранов с вырезом — увеличиваем отступ сверху */

/* === SAFE AREA FIX — вставить в начало CSS === */
:root {

<script>
    document.addEventListener('DOMContentLoaded', () => {
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg))
            .catch(err => console.error('SW error:', err));
    }
});

    let myNick = localStorage.getItem('soc-nickname');
    let myAvatar = localStorage.getItem('soc-avatar') || 'image/ava1.png';
    let myStatus = localStorage.getItem('soc-status') || 'online';
    let peer = null;
    let conn = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let activeStream = null;
    let lastDateLabel = "";
    let connectedNick = null;
    let connectedAvatar = null;
    let connectedStatus = null;
    let lastMessageText = "---";
    
    // Переменные для непрочитанных сообщений
    let unreadCount = 0;
    let isChatOpen = false;
    
    // Хранилище реакций: { msgId: { my: emoji или null, peer: emoji или null } }
    let reactionsStore = new Map();
    let activeReactionPicker = null;
    
    const homeScreen = document.getElementById('homeScreen');
    const chatScreen = document.getElementById('chatScreen');
    const homeNickSpan = document.getElementById('homeNick');
    const homeStatusSpan = document.getElementById('homeStatus');
    const homeAvatarImg = document.getElementById('homeAvatarImg');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const peerNickChat = document.getElementById('peerNickChat');
    const peerAvatarChat = document.getElementById('peerAvatarImg');
    const activeChatRow = document.getElementById('activeChatRow');
    const activeChatAvatar = document.getElementById('activeChatAvatar');
    const activeChatNick = document.getElementById('activeChatNick');
    const activeChatLastMsg = document.getElementById('activeChatLastMsg');
    const connectSection = document.getElementById('connectSection');
    const notConnectedPlaceholder = document.getElementById('notConnectedPlaceholder');
    const unreadBadge = document.getElementById('unreadBadge');
    
    // Элементы для кнопки прокрутки
    const scrollDownBtn = document.getElementById('scrollDownBtn');
    let isUserScrolling = false;
    let scrollTimeout = null;
    
    function updateUnreadBadge() {
        if (unreadBadge) {
            if (unreadCount > 0 && !isChatOpen) {
                unreadBadge.style.display = 'flex';
                unreadBadge.textContent = unreadCount > 99 ? '99+' : unreadCount;
            } else {
                unreadBadge.style.display = 'none';
            }
        }
    }
    
    function resetUnreadCount() {
        if (isChatOpen) {
            unreadCount = 0;
            updateUnreadBadge();
        }
    }
    
    function incrementUnreadCount() {
        if (!isChatOpen) {
            unreadCount++;
            updateUnreadBadge();
        }
    }
    
    // Функции для кнопки прокрутки вниз
    function checkScrollPosition() {
        if (!chatMessagesDiv) return;
        const isNearBottom = chatMessagesDiv.scrollHeight - chatMessagesDiv.scrollTop - chatMessagesDiv.clientHeight < 100;
        
        if (!isNearBottom && !isUserScrolling) {
            scrollDownBtn.classList.add('visible');
        } else {
            scrollDownBtn.classList.remove('visible');
        }
    }
    
    function scrollToBottom() {
        if (!chatMessagesDiv) return;
        chatMessagesDiv.scrollTo({
            top: chatMessagesDiv.scrollHeight,
            behavior: 'smooth'
        });
        scrollDownBtn.classList.remove('visible');
        isUserScrolling = false;
    }
    
    function onChatScroll() {
        isUserScrolling = true;
        if (scrollTimeout) clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
            isUserScrolling = false;
            checkScrollPosition();
        }, 150);
        checkScrollPosition();
    }
    
function animateModalClose(modalElement, callback) {
    const modalContent = modalElement.querySelector('.modal');
    if (modalContent) {
        // Убираем предыдущую анимацию
        modalContent.classList.remove('modal-exit');
        // Принудительная перерисовка
        void modalContent.offsetWidth;
        // Добавляем анимацию закрытия
        modalContent.classList.add('modal-exit');
        
        setTimeout(() => {
            modalElement.style.display = 'none';
            modalContent.classList.remove('modal-exit');
            if (callback) callback();
        }, 150); // Уменьшил до 150ms для отзывчивости
    } else {
        modalElement.style.display = 'none';
        if (callback) callback();
    }
}

function showModalWithAnimation(modalElement) {
    modalElement.style.display = 'flex';
    const modalContent = modalElement.querySelector('.modal');
    if (modalContent) {
        modalContent.classList.remove('modal-exit');
        void modalContent.offsetWidth;
        modalContent.style.animation = 'none';
        void modalContent.offsetWidth;
        modalContent.style.animation = 'modalPopIn 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
    }
}
    
    function handleCustomAvatarUpload(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            tempAvatar = ev.target.result;
            document.getElementById('modalAvatarImg').src = tempAvatar;
        };
        reader.readAsDataURL(file);
    }
    
    function formatLastMessage(type, data) {
        if (type === 'text') return data.length > 30 ? data.substring(0, 27) + '...' : data;
        if (type === 'image') return '✿ Photo';
        if (type === 'audio') return '♪ Voice message';
        return '---';
    }
    
    function updateLastMessage(type, data) {
        lastMessageText = formatLastMessage(type, data);
        if (activeChatLastMsg) activeChatLastMsg.innerText = lastMessageText;
    }
    
    function updateHomeUI() {
        homeNickSpan.innerText = myNick || '---';
        homeStatusSpan.innerText = myStatus;
        homeAvatarImg.src = myAvatar;
    }
    
    function updateUIForConnectionState(hasActiveChat) {
        if (hasActiveChat && connectedNick && conn && conn.open) {
            activeChatRow.style.display = 'flex';
            connectSection.style.display = 'none';
            notConnectedPlaceholder.style.display = 'none';
            activeChatNick.innerText = connectedNick;
            activeChatAvatar.src = connectedAvatar || 'image/ava1.png';
            activeChatLastMsg.innerText = lastMessageText;
        } else {
            activeChatRow.style.display = 'none';
            connectSection.style.display = 'block';
            notConnectedPlaceholder.style.display = 'flex';
            unreadCount = 0;
            updateUnreadBadge();
        }
    }
    
    function updateChatHeader() {
        peerNickChat.innerText = connectedNick || 'friend';
        peerAvatarChat.src = connectedAvatar || 'image/ava1.png';
    }
    
    function isValidNick(nick) {
        if (!nick || nick.length < 3) return false;
        return /^[a-zA-Z0-9_]{3,20}$/.test(nick);
    }
    
    function showValidationError(returnToModal) {
        const overlay = document.getElementById('modal-overlay');
        const txtDiv = document.getElementById('modal-text');
        txtDiv.style.textAlign = 'center';
        txtDiv.innerHTML = `Nickname must be 3-20 characters (letters, numbers, _)`;
        const actionsDiv = document.getElementById('modal-actions');
        actionsDiv.innerHTML = `<button class="modal-btn" id="errorOkBtn" style="width:100%">OK</button>`;
        showModalWithAnimation(overlay);
        document.getElementById('errorOkBtn').onclick = () => {
            animateModalClose(overlay, () => {
                if (returnToModal === 'registration') {
                    showModalWithAnimation(document.getElementById('registrationModal'));
                    document.getElementById('regNickInput').value = '';
                    document.getElementById('regNickInput').focus();
                } else if (returnToModal === 'profile') {
                    showModalWithAnimation(document.getElementById('profileModal'));
                }
            });
        };
    }
    
    function showNicknameTakenError(returnToModal) {
        const overlay = document.getElementById('modal-overlay');
        const txtDiv = document.getElementById('modal-text');
        txtDiv.style.textAlign = 'center';
        txtDiv.innerHTML = `<b style="color:white; display:block; margin-bottom:10px;">Nickname already taken! Choose another one.</b>`;
        const actionsDiv = document.getElementById('modal-actions');
        actionsDiv.innerHTML = `<button class="modal-btn" id="errorOkBtn" style="width:100%">OK</button>`;
        showModalWithAnimation(overlay);
        document.getElementById('errorOkBtn').onclick = () => {
            animateModalClose(overlay, () => {
                if (returnToModal === 'registration') {
                    showModalWithAnimation(document.getElementById('registrationModal'));
                    document.getElementById('regNickInput').value = '';
                    document.getElementById('regNickInput').focus();
                } else if (returnToModal === 'profile') {
                    showModalWithAnimation(document.getElementById('profileModal'));
                }
            });
        };
    }
    
    function showRegistrationModal() {
        document.getElementById('regNickInput').value = '';
        showModalWithAnimation(document.getElementById('registrationModal'));
        setTimeout(() => document.getElementById('regNickInput').focus(), 100);
    }
    
    // Функции реакций
    function showReactionPicker(msgElement, msgId, isMyMessage) {
        if (activeReactionPicker) {
            activeReactionPicker.remove();
            activeReactionPicker = null;
        }
        const picker = document.createElement('div');
        picker.className = 'reaction-picker';
        const reactions = ['❤️', '👍', '👎', '😂', '❗', '❓'];
        reactions.forEach(emoji => {
            const span = document.createElement('span');
            span.innerText = emoji;
            span.className = 'reaction-emoji';
            span.onclick = (e) => {
                e.stopPropagation();
                sendReactionToggle(msgId, emoji);
                picker.remove();
                activeReactionPicker = null;
            };
            picker.appendChild(span);
        });
        
        const rect = msgElement.getBoundingClientRect();
        const viewportHeight = window.innerHeight;
        const viewportWidth = window.innerWidth;
        const pickerWidth = 190;
        
        let top = rect.top - 50;
        if (top < 10) top = rect.bottom + 10;
        if (top + 60 > viewportHeight) top = viewportHeight - 70;
        if (top < 0) top = 5;
        
        let left;
        if (isMyMessage) {
            left = rect.left - pickerWidth - 8;
            if (left < 5) {
                left = rect.right + 2;
            }
        } else {
            left = rect.right - 28;
            if (left + pickerWidth > viewportWidth) {
                left = rect.left - pickerWidth - 2;
            }
        }
        if (left < 5) left = 5;
        if (left + pickerWidth > viewportWidth) left = viewportWidth - pickerWidth - 5;
        
        picker.style.position = 'fixed';
        picker.style.top = top + 'px';
        picker.style.left = left + 'px';
        
        document.body.appendChild(picker);
        activeReactionPicker = picker;
        
        const closePicker = (e) => {
            if (picker && !picker.contains(e.target)) {
                picker.remove();
                activeReactionPicker = null;
                document.removeEventListener('click', closePicker);
            }
        };
        setTimeout(() => document.addEventListener('click', closePicker), 10);
    }
    
    function sendReactionToggle(msgId, emoji) {
        if (!conn || !conn.open) return;
        conn.send({ type: 'reaction_toggle', msgId: msgId, emoji: emoji });
        toggleLocalReaction(msgId, emoji);
    }
    
    function toggleLocalReaction(msgId, emoji) {
        if (!reactionsStore.has(msgId)) {
            reactionsStore.set(msgId, { my: null, peer: null });
        }
        const store = reactionsStore.get(msgId);
        
        if (store.my === emoji) {
            store.my = null;
        } else {
            store.my = emoji;
        }
        updateReactionsUI(msgId);

    function handlePeerReaction(msgId, emoji) {
        if (!reactionsStore.has(msgId)) {
            reactionsStore.set(msgId, { my: null, peer: null });
        }
        const store = reactionsStore.get(msgId);
        
        if (store.peer === emoji) {
            store.peer = null;
        } else {
            store.peer = emoji;
        }
        updateReactionsUI(msgId);
    }
    
    function updateReactionsUI(msgId) {
        const targetMsg = document.querySelector(`.msg[data-msg-id="${msgId}"]`);
        if (!targetMsg) return;
        
        let reactionsContainer = targetMsg.querySelector('.reactions-container');
        if (reactionsContainer) reactionsContainer.remove();
        
        const store = reactionsStore.get(msgId);
        if (!store) return;
        
        reactionsContainer = document.createElement('div');
        reactionsContainer.className = 'reactions-container';
        
        const hasMy = store.my !== null;
        const hasPeer = store.peer !== null;
        const sameEmoji = hasMy && hasPeer && store.my === store.peer;
        
        if (sameEmoji) {
            const badge = document.createElement('div');
            badge.className = 'reaction-badge my-reaction';
            badge.innerHTML = `${store.my} <span class="reaction-count">2</span>`;
            badge.onclick = (e) => {
                e.stopPropagation();
                sendReactionToggle(msgId, store.my);
            };
            reactionsContainer.appendChild(badge);
        } else {
            if (store.my) {
                const badge = document.createElement('div');
                badge.className = 'reaction-badge my-reaction';
                badge.innerHTML = store.my;
                badge.onclick = (e) => {
                    e.stopPropagation();
                    sendReactionToggle(msgId, store.my);
                };
                reactionsContainer.appendChild(badge);
            }
            if (store.peer) {
                const badge = document.createElement('div');
                badge.className = 'reaction-badge';
                badge.innerHTML = store.peer;
                badge.onclick = (e) => {
                    e.stopPropagation();
                    sendReactionToggle(msgId, store.peer);
                };
                reactionsContainer.appendChild(badge);
            }
        }
        
        if (reactionsContainer.children.length > 0) {
            targetMsg.appendChild(reactionsContainer);
        }
    }

    function setupConnection() {
        if (!conn) return;
        conn.on('open', () => {
            conn.send({ type: 'profile', nick: myNick, avatar: myAvatar, status: myStatus });
            chatMessagesDiv.innerHTML = '';
            lastDateLabel = '';
            lastMessageText = "---";
            reactionsStore.clear();
            updateUIForConnectionState(true);
            updateStatus(`CHAT WITH: ${connectedNick || 'friend'}`, '#559b61');
            switchToChatMode();
        });
        conn.on('data', (payload) => {
            if (payload && payload.type) {
                if (payload.type === 'profile') {
                    connectedNick = payload.nick;
                    connectedAvatar = payload.avatar;
                    connectedStatus = payload.status || 'user';
                    updateChatHeader();
                    updateUIForConnectionState(true);
                    updateStatus(`CHAT WITH: ${connectedNick}`, '#559b61');
                } else if (payload.type === 'clear') {
                    localStorage.removeItem('soc-c-media-history');
                    chatMessagesDiv.innerHTML = '';
                    lastDateLabel = '';
                    reactionsStore.clear();
                } else if (payload.type === 'peer_closed_chat') {
                    showAlert(`${payload.nick || 'Friend'} closed the chat`);
                    fullCloseChat();
                } else if (payload.type === 'text' || payload.type === 'image' || payload.type === 'audio') {
                    if (payload.type === 'text') updateLastMessage('text', payload.data);
                    else if (payload.type === 'image') updateLastMessage('image', null);
                    else if (payload.type === 'audio') updateLastMessage('audio', null);
                    addMsg(payload.data, 'other', payload.type, true, null, payload.msgId);
                    incrementUnreadCount();
                } else if (payload.type === 'reaction_toggle') {
                    handlePeerReaction(payload.msgId, payload.emoji);
                }
            }
        });
        conn.on('close', () => {
            fullCloseChat();
        });
    }

    function addMsg(data, side, type, saveToStorage = true, savedTime = null, existingMsgId = null) {
        const container = chatMessagesDiv;
        if (!container) return;
        if (side === 'my') {
            if (type === 'text') updateLastMessage('text', data);
            else if (type === 'image') updateLastMessage('image', null);
            else if (type === 'audio') updateLastMessage('audio', null);
        }
        const now = savedTime ? new Date(savedTime) : new Date();
        const dateOptions = { day: 'numeric', month: 'long' };
        const currentDateLabel = now.toLocaleDateString('en-US', dateOptions);
        if (currentDateLabel !== lastDateLabel) {
            const dateDiv = document.createElement('div'); dateDiv.className = 'date-divider'; dateDiv.innerText = currentDateLabel;
            container.appendChild(dateDiv);
            lastDateLabel = currentDateLabel;
        }
        const msgId = existingMsgId || `msg_${Date.now()}_${Math.random()}`;
        const msgDiv = document.createElement('div'); 
        msgDiv.className = `msg ${side === 'my' ? 'my' : 'other'}`;
        msgDiv.setAttribute('data-msg-id', msgId);
        
        const content = document.createElement('div');
        if (type === 'text') content.innerText = data;
        else if (type === 'image') { const img = document.createElement('img'); img.src = data; content.appendChild(img); }
        else if (type === 'audio') { const audioEl = document.createElement('audio'); audioEl.controls = true; audioEl.src = data; content.appendChild(audioEl); }
        msgDiv.appendChild(content);
        
        const timeDiv = document.createElement('div'); timeDiv.className = 'msg-time';
        timeDiv.innerText = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        msgDiv.appendChild(timeDiv);
        
        container.appendChild(msgDiv);
        
        const wasNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 100;
        if (side === 'my' || wasNearBottom) {
            container.scrollTop = container.scrollHeight;
        }
        
        if (!reactionsStore.has(msgId)) {
            reactionsStore.set(msgId, { my: null, peer: null });
        }
        
        const isMyMessage = (side === 'my');
        msgDiv.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            showReactionPicker(msgDiv, msgId, isMyMessage);
            return false;
        });
        let lastTap = 0;
        msgDiv.addEventListener('touchstart', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                e.preventDefault();
                showReactionPicker(msgDiv, msgId, isMyMessage);
            }
            lastTap = currentTime;
        });
        
        if (side === 'other' && !savedTime) { 
            const sound = document.getElementById('msgSound'); 
            if(sound) sound.play().catch(e=>{}); 
        }
        
        if (saveToStorage) {
            const history = JSON.parse(localStorage.getItem('soc-c-media-history') || '[]');
            history.push({ data, side, type, time: now.getTime(), msgId: msgId });
            if (history.length > 50) history.shift();
            localStorage.setItem('soc-c-media-history', JSON.stringify(history));
        }
        
        setTimeout(() => checkScrollPosition(), 50);
        return msgId;
    }
    
    function loadHistory() {
        const raw = localStorage.getItem('soc-c-media-history');
        if (!raw) return;
        try {
            const history = JSON.parse(raw);
            if (history.length > 0) {
                chatMessagesDiv.innerHTML = "";
                lastDateLabel = "";
                reactionsStore.clear();
                history.forEach(item => {
                    addMsg(item.data, item.side, item.type, false, item.time, item.msgId);
                });
                const lastMsg = history[history.length - 1];
                if (lastMsg) updateLastMessage(lastMsg.type, lastMsg.data);
                setTimeout(() => {
                    if (chatMessagesDiv) chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
                }, 100);
            }
        } catch(e) { console.error("History load error", e); }
    }

    async function toggleRecord() {
        const btn = document.getElementById('recordBtn');
        const micImg = document.getElementById('mic-icon');
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            if (activeStream) { activeStream.getTracks().forEach(track => track.stop()); activeStream = null; }
            btn.classList.remove('btn-red');
            if (micImg) micImg.src = "image/mic.png";
            return;
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            activeStream = stream;
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = (ev) => { 
                    if (conn && conn.open) {
                        const msgId = `msg_${Date.now()}_${Math.random()}`;
                        conn.send({ type: 'audio', data: ev.target.result, msgId: msgId }); 
                        addMsg(ev.target.result, 'my', 'audio', true, null, msgId); 
                    }
                };
                reader.readAsDataURL(blob);
            };
            mediaRecorder.start();
            btn.classList.add('btn-red');
            if (micImg) micImg.src = "image/stop.png";
        } catch(err) { showAlert("Mic access denied"); }
    }

    window.addEventListener('beforeunload', () => { if(conn && conn.open) conn.close(); if(peer) peer.destroy(); });

    // ===== ПОЛНОЕ ОПРЕДЕЛЕНИЕ ВЫРЕЗОВ =====
function getDeviceNotchInfo() {
    const info = {
        hasNotch: false,
        hasDynamicIsland: false,
        hasHomeIndicator: false,
        topInset: 0,
        bottomInset: 0,
        deviceType: 'unknown'
    };
    
    // Получаем safe-area insets
    const topInset = parseInt(getComputedStyle(document.documentElement)
        .getPropertyValue('env(safe-area-inset-top)')) || 0;
    const bottomInset = parseInt(getComputedStyle(document.documentElement)
        .getPropertyValue('env(safe-area-inset-bottom)')) || 0;
    
    info.topInset = topInset;
    info.bottomInset = bottomInset;
    info.hasHomeIndicator = bottomInset > 0;
    
    // Определяем наличие выреза
    if (topInset > 20) {
        info.hasNotch = true;
        
        // Определяем Dynamic Island (iPhone 14 Pro и новее)
        // Dynamic Island обычно дает inset около 59px
        if (topInset >= 50 && topInset <= 65) {
            info.hasDynamicIsland = true;
            info.deviceType = 'iPhone with Dynamic Island';
        } else if (topInset >= 40 && topInset <= 50) {
            info.deviceType = 'iPhone with Notch';
        } else {
            info.deviceType = 'Android with Notch/Punch-hole';
        }
    } else {
        info.deviceType = 'Standard device (no notch)';
    }
    
    // Добавляем классы на body
    if (info.hasNotch) document.body.classList.add('has-notch');
    if (info.hasDynamicIsland) document.body.classList.add('has-dynamic-island');
    if (info.hasHomeIndicator) document.body.classList.add('has-home-indicator');
    
    // Сохраняем в data-атрибуты
    document.body.dataset.notchType = info.deviceType;
    document.body.dataset.topInset = info.topInset;
    document.body.dataset.bottomInset = info.bottomInset;
    
    console.log('📱 Device info:', info);
    
    return info;
}

// Вызываем при загрузке и изменении размера
window.addEventListener('DOMContentLoaded', getDeviceNotchInfo);
window.addEventListener('resize', () => setTimeout(getDeviceNotchInfo, 100));
</script>
